name: Security Audit

# Runs npm audit on every push and PR to ensure no known vulnerabilities
# are introduced into the dependency tree.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly-disclosed CVEs
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run security audit
        run: npm audit --audit-level=moderate
