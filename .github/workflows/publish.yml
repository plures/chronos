name: Publish to npm

# Triggered when a GitHub release is published.
# Creates the git tag, builds (type-check only — no transpile needed for ESM),
# and publishes to the npm registry using the NPM_TOKEN secret.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # needed for provenance attestation

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check before publish
        run: npm run typecheck

      - name: Publish package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
