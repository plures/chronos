name: Publish to npm

# Fallback: triggered when a GitHub release is published manually from the
# GitHub UI.  Releases created automatically by release.yml (via GITHUB_TOKEN)
# do NOT fire this trigger (GitHub prevents GITHUB_TOKEN-created events from
# cascading to other workflows), so release.yml handles npm publish directly
# in its own `publish` job.  This workflow exists as a safety net for any
# release created outside of the automated pipeline.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # needed for provenance attestation

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check before publish
        run: npm run typecheck

      - name: Publish package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
