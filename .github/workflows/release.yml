name: Create Release

# Automatically creates a GitHub release and git tag when the version in
# package.json is bumped on the main branch, then publishes the package to npm.
#
# How to cut a new release:
#   1. Bump `version` in package.json (and update CHANGELOG.md).
#   2. Merge the PR to main.
#   3. This workflow detects the version change, creates the GitHub release,
#      and publishes the package to npm.
#
# Note: publish.yml still handles releases created manually from the GitHub UI.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag_exists: ${{ steps.tag_check.outputs.exists }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read current version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog entry
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md.
          # Use a flag-based approach so the section header itself doesn't
          # accidentally close the range (range patterns have that pitfall).
          BODY=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            found && /^## \[/    { exit }
            found                { print }
          " CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '/^---$/d')
          # Fallback if no changelog entry found
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          # Write to file to avoid quoting issues
          echo "$BODY" > /tmp/release_notes.txt

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tag = '${{ steps.version.outputs.tag }}';
            const name = '${{ steps.version.outputs.tag }}';
            const body = fs.readFileSync('/tmp/release_notes.txt', 'utf8').trim();

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name,
              body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });

            core.info(`Created release ${release.tag_name}: ${release.html_url}`);

  publish:
    name: npm publish
    needs: release
    if: needs.release.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type-check before publish
        run: npm run typecheck

      - name: Publish package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
