name: Create Release

# Automatically creates a GitHub release and git tag when the version in
# package.json is bumped on the main branch.  The release triggers the
# "Publish to npm" workflow which pushes the package to the npm registry.
#
# How to cut a new release:
#   1. Bump `version` in package.json (and update CHANGELOG.md).
#   2. Merge the PR to main.
#   3. This workflow detects the version change and creates the GitHub release.
#   4. The release event triggers publish.yml → npm publish.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read current version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog entry
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          # Fallback if no changelog entry found
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          # Write to file to avoid quoting issues
          echo "$BODY" > /tmp/release_notes.txt

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tag = '${{ steps.version.outputs.tag }}';
            const name = '${{ steps.version.outputs.tag }}';
            const body = fs.readFileSync('/tmp/release_notes.txt', 'utf8').trim();

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name,
              body,
              draft: false,
              prerelease: false,
              target_commitish: context.sha,
            });

            core.info(`Created release ${release.tag_name}: ${release.html_url}`);
